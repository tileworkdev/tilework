services:
  tileworkui:
    image: tilework/tilework:latest
    ports:
      - 5180:5180
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    volumes:
      - tilework_data:/var/lib/tilework
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  tilework_data:
    external: false
